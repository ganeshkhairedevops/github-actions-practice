name: Smart Trigger

on:
  push:
    branches:
      - main
      - release/*
    paths:
      - 'src/**'
      - 'app/**'

jobs:
  run-on-code-change:
    runs-on: ubuntu-latest
    steps:
      - name: Print message
        run: |
            echo "Workflow triggered because src/ or app/ changed!"
            echo "Code files changed"
