name: Job Output

on:
  workflow_dispatch:
  #push:

jobs:
  generate-date:
    runs-on: ubuntu-latest
    outputs:
      today: ${{ steps.date-step.outputs.today }}

    steps:
      - name: Generate date
        id: date-step
        run: echo "today=$(date)" >> $GITHUB_OUTPUT

  use-date:
    runs-on: ubuntu-latest
    needs: generate-date

    steps:
      - name: Print date from previous job
        run: echo "Today's date is ${{ needs.generate-date.outputs.today }}"